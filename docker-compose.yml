version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenda_secret}
      POSTGRES_DB: ${POSTGRES_DB:-agenda_scolaire}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenda}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agenda}:${POSTGRES_PASSWORD:-agenda_secret}@db:5432/${POSTGRES_DB:-agenda_scolaire}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production_use_32_chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAILS_FROM: ${EMAILS_FROM:-noreply@agenda-scolaire.fr}
      UPLOAD_DIR: /app/uploads
      OPENAI_API_KEY: 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
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agenda}:${POSTGRES_PASSWORD:-agenda_secret}@db:5432/${POSTGRES_DB:-agenda_scolaire}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production_use_32_chars}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
